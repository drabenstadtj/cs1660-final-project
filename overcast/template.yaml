AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Overcast - serverless blogging platform
  
# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 10
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        # Pass table names into every Lambda as environment variables
        POSTS_TABLE: !Ref PostsTable
        USERS_TABLE: !Ref UsersTable
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
    Auth:
      DefaultAuthorizer: CognitoAuthorizer
      AddDefaultAuthorizerToCorsPreflight: false
      Authorizers:
        CognitoAuthorizer: # set the authorizer to our UserPool resource
          UserPoolArn: !GetAtt UserPool.Arn

Resources:

  # DynamoDB
  PostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: overcast-posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: postId
          AttributeType: S
      KeySchema:
        - AttributeName: postId
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: overcast-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # Lambda Functions
  GetPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: posts.getPosts # calls getPosts() exported from src/posts.js
      Policies:
        - DynamoDBReadPolicy: # grants this Lambda read-only access to the posts table
            TableName: !Ref PostsTable
      Events:
        GetPosts:
          Type: Api
          Properties:
            Path: /posts
            Method: get       # GET /posts -> this Lambda
            Auth:
              Authorizer: NONE  # make this not require auth
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: SNS
            Destination: !GetAtt LambdaFailureAlertTopic.TopicArn

  CreatePostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: posts.createPost
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref PostsTable
      Events:
        CreatePost:
          Type: Api
          Properties:
            Path: /posts
            Method: post
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: SNS
            Destination: !GetAtt LambdaFailureAlertTopic.TopicArn

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: posts.getUploadUrl
      Environment:
        Variables:
          MEDIA_BUCKET: !Ref MediaBucket
      Policies:
        - S3WritePolicy:
            BucketName: !Ref MediaBucket
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            Path: /upload-url
            Method: get        # GET /upload-url?filename=x&contentType=y
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: SNS
            Destination: !GetAtt LambdaFailureAlertTopic.TopicArn

    # Cognito

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AutoVerifiedAttributes:
        - email
    
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: overcast-web-client
      UserPoolId: !Ref UserPool

  # SNS topic for Lambda failure alerts
  LambdaFailureAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: overcast-lambda-failures
      Subscription:
        - Protocol: email
          Endpoint: jackdrabenstadt@gmail.com
  
  # S3 bucket for frontend hosting
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: overcast-frontend
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  # S3 bucket policy to allow public read
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'

  # S3 bucket for media uploads
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: overcast-media
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
            AllowedOrigins:
              - '*'

  # CloudFront distribution for frontend
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          TargetOriginId: FrontendBucketOrigin
          ForwardedValues:
            QueryString: false
        DefaultRootObject: index.html
        Enabled: true
        Origins:
          - Id: FrontendBucketOrigin
            DomainName: !Select [1, !Split ['://', !GetAtt FrontendBucket.WebsiteURL]]
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  
  FrontendURL:
    Description: CloudFront URL for frontend
    Value: !GetAtt FrontendDistribution.DomainName